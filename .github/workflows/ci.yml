# SeekDeep CI · preflight on every push + PR
#
# Runs the same `npm run preflight` you run locally:
#   - node --check on every JS file we ship (index.js, smoke_test.mjs,
#     scripts/preflight.mjs, gui/nav.js)
#   - python -m py_compile on every Python file we ship
#     (local_ai_server.py, warmup_local_cache.py, gui_endpoints.py)
#   - the smoke suite (smoke_test.mjs) — safe on CI, no Discord login,
#     no model load, no file mutation
#
# Deliberately minimal: no Docker, no GPU-dependent tests, no model
# downloads, no Python deps install. py_compile only checks syntax,
# so we don't need to pip-install transformers / torch / fastapi to
# validate the file parses. The smoke suite imports index.js with
# SEEKDEEP_TEST_MODE=1, which gates Client instantiation.
#
# If a stage fails, the workflow exits non-zero and the commit gets
# the red X badge. Open the Actions tab on github.com for the
# per-stage detail.

name: preflight

# CI-6: least-privilege token — this job only reads the repo.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Node 20 is EOL (2026-04-30). We floor at 22 LTS and test the two
    # supported lines: 22 (the engines floor) and 24 (the dev/runtime).
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install npm deps
        run: npm ci

      - name: Install minimal Python deps for gui-smoke stage
        # The full requirements-local.txt is enormous (torch, transformers,
        # diffusers, ...). gui-smoke only imports local_ai_server, which
        # at module top needs: fastapi + pydantic + dotenv + Pillow. The
        # heavy ML deps (torch/transformers/diffusers) are lazy-imported
        # inside route handlers so they don't fire on module load.
        #
        # If you add a new top-level import to local_ai_server.py or
        # gui_endpoints.py, add the corresponding pip package here too,
        # otherwise CI will turn red on the next push.
        #
        # huggingface_hub is included because gui-smoke exercises
        # /model/uninstall, which calls scan_cache_dir(). Without the
        # package the endpoint returns 500 instead of the idempotent
        # 200 the smoke test asserts on.
        run: python -m pip install --upgrade pip && python -m pip install 'fastapi>=0.115.0' 'httpx>=0.27.0' 'pydantic>=2.10.0' 'python-dotenv>=1.0.0' 'Pillow>=10.0.0' 'huggingface_hub>=0.24.0'

      - name: Run preflight (js + html-js + py + smoke + gui-smoke + docs)
        env:
          # smoke_test.mjs reads CI to skip anything GPU/network-bound.
          # SEEKDEEP_TEST_MODE is set by smoke_test.mjs itself.
          CI: '1'
        # The `rust` stage skips-with-warn here (no cargo on this runner);
        # the dedicated `rust` job below does the real cargo check.
        run: npm run preflight

  # SEC-2: type-check the Tauri/Rust desktop shell on its own runner so a
  # broken sidecar.rs / lib.rs is caught at PR time, not at MSI-build time.
  #
  # Matrixed across all three target OSes. PR CI used to cargo-check on
  # ubuntu only, so Windows-only / macOS-only cfg arms (e.g. the per-OS
  # branches of resolve_docker_cli()) never compiled until the release
  # build on a tagged push — a platform-specific break could pass every PR
  # check and only surface at MSI/DMG time. Now every PR compiles each
  # OS's cfg arms. fail-fast:false so one red OS doesn't mask the others.
  rust:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      # Tauri's Linux backend (webkit2gtk) needs system libs; the Windows
      # (WebView2 + MSVC) and macOS (WebKit + clang) runners ship what
      # `cargo check` needs, so this step is Linux-only.
      - name: Install Tauri Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
