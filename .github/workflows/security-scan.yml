# SeekDeep CI · dependency + secret scanning (deep-audit CI-3)
#
# The repo ships self-updating installers and pip-installs torch on user
# machines, but had ZERO automated supply-chain scanning. This adds it:
#   - npm audit       (Node deps)        — fails on HIGH/critical advisories
#   - pip-audit       (Python deps)      — reports advisories (non-blocking; a
#                                          transitive moderate shouldn't red-X
#                                          the repo, but it's visible in the log)
#   - cargo audit     (Rust/Tauri deps)  — reports RustSec advisories
#   - gitleaks        (secret scan)      — FAILS on a committed secret
#
# Runs weekly, on demand, and on pushes/PRs to main. Thresholds are deliberately
# lenient to start (so day-1 transitive advisories don't block); tighten as the
# backlog is cleared.

name: security-scan

on:
  schedule:
    - cron: '0 8 * * 1'   # Mondays 08:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      # Audit against the lockfile without installing. HIGH/critical fail the job.
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  pip-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      # Boot deps are fully resolvable on Linux. Non-blocking: report findings
      # without failing the pipeline (these are advisories to triage, and the
      # +cu128 torch index in the ML file isn't reliably auditable on CI).
      - name: pip-audit requirements-local.txt
        continue-on-error: true
        run: pip-audit -r requirements-local.txt --desc

  cargo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true
      - name: cargo audit
        continue-on-error: true
        run: cargo audit --file src-tauri/Cargo.lock

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
