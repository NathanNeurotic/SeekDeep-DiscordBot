# SeekDeep CI · browser-driven Control Center e2e (audit §12)
#
# Boots local_ai_server.py in degraded mode (no torch / no GPU — the ML deps
# are lazy-imported inside route handlers, so the server still serves /gui,
# /config, /data, and the 1Hz system-state writer), then drives the real
# Control Center pages with Playwright + chromium and asserts the surfaces
# the audit flagged: version pill resolves, feature toggles hydrate, the
# auto-react pane round-trips, system-state.json is served, no console errors.
#
# This is the safety net that was missing: the in-process smoke suite never
# loaded HTML or clicked anything, so UI regressions shipped unseen.

name: e2e

# CI-6: least-privilege token — this job only reads the repo.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  control-center:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install npm deps
        run: npm ci

      - name: Install minimal Python deps to boot the server degraded
        # Same minimal set as the preflight job. torch/transformers/diffusers
        # are lazy-imported in route handlers, so the server boots + serves
        # the GUI without them. That's all the e2e specs need.
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'fastapi>=0.115.0' 'uvicorn>=0.30.0' 'httpx>=0.27.0' \
            'pydantic>=2.10.0' 'python-dotenv>=1.0.0' 'Pillow>=10.0.0' \
            'huggingface_hub>=0.24.0' 'websockets>=12.0'

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Boot AI server (degraded) + wait for /health
        run: |
          python local_ai_server.py > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 30); do
            if curl -s -m 2 -o /dev/null -w '%{http_code}' http://127.0.0.1:7865/health | grep -q 200; then
              echo "server ready"; exit 0
            fi
            sleep 2
          done
          echo "server failed to come up; log:"; cat server.log; exit 1

      - name: Run Control Center e2e (chromium)
        env:
          SEEKDEEP_E2E_CHANNEL: chromium
        run: npm run test:e2e

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: server-log
          path: server.log
          if-no-files-found: ignore

      - name: Stop server
        if: always()
        run: '[ -f server.pid ] && kill "$(cat server.pid)" || true'
