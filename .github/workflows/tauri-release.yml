# SeekDeep · Tauri rolling-nightly build
#
# On every push to main, matrix-builds the Tauri desktop shell for
# Windows / macOS / Linux and publishes the resulting installers as a
# single rolling pre-release tagged `nightly`. The tag is force-moved
# each run so storage stays bounded (one set of installers, always
# pointing at the latest main).
#
# Independent from the preflight workflow — that catches code regressions;
# this catches build/packaging regressions. Both run in parallel on push.
#
# Triggers:
#   - push to main (auto-build the rolling nightly)
#   - tag push (v*.*.*) → publishes a stable release with the tag name
#   - workflow_dispatch (manual run from the Actions UI)
#
# Public repo, so all three OS runners are free (no Actions minutes
# billing). Typical full-matrix build: ~10-15 min cached.
#
# Code signing: deliberately NOT wired here. Without certs, Windows
# shows "unverified publisher" SmartScreen warning and macOS shows
# "Apple cannot verify this developer" on first launch — tolerable
# for nightly. Wire signing when promoting to stable channel.

name: tauri-release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Wipe stale assets off the rolling `nightly` tag BEFORE the matrix runs.
  # tauri-action only overwrites assets with matching filenames — when our
  # bundle version changes (e.g. `0.1.0` → `10.35.0` after wiring tauri.conf
  # to package.json), the old filenames stay attached forever. Cleanup
  # guarantees the nightly release always has exactly one version's
  # worth of installers.
  #
  # Skipped on tag pushes (`v*.*.*`) because those publish to their own
  # tag, not to `nightly`. The downstream `build` job uses `if: always()`
  # so a skipped cleanup doesn't block it.
  cleanup-nightly:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete prior nightly release + RECREATE empty so matrix doesn't race
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_TS: ${{ github.event.head_commit.timestamp }}
        run: |
          set -euo pipefail
          # Step 1 — delete the ENTIRE nightly release + tag (not just assets)
          # so we can re-author the body at this commit's SHA. tauri-action
          # only uploads new assets to an existing release; it does NOT
          # update the body, so the original body sticks forever otherwise.
          if gh release view nightly --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Deleting existing nightly release + tag…"
            gh release delete nightly --repo "${{ github.repository }}" --yes --cleanup-tag || true
          else
            echo "No existing nightly release — nothing to clean."
          fi
          # Step 2 — pre-create the release HERE so the matrix jobs find it
          # existing and ONLY upload their assets. Without this step, all
          # three matrix builds (Windows / macOS / Linux) race to create
          # the release simultaneously, the GitHub API returns 422
          # 'already_exists' to two of them, the build jobs exit non-zero
          # even though the installers built fine, AND nothing publishes.
          # This was the 2026-05-27 failure: cleanup deleted the release,
          # three parallel builds raced to recreate, all three failed,
          # `gh release view nightly` then returned 'release not found'.
          # Pre-creating eliminates the race.
          echo "Pre-creating empty nightly release at ${COMMIT_SHA}…"
          # Body kept in sync with the matrix step's `releaseBody:` — if
          # you edit one, edit both. Workflow expressions interpolate
          # into env: above; shell heredoc just expands env vars.
          cat > /tmp/release-body.md <<EOF
          **Rolling nightly build** — auto-built from the latest commit on \`main\`.

          Picked from commit \`${COMMIT_SHA}\` on ${COMMIT_TS}.

          **Installation:**
          - **Windows:** download \`.msi\` or \`.exe\`, double-click. SmartScreen will warn — see below.
          - **macOS:** download \`.dmg\`, drag SeekDeep to Applications. First launch: right-click → "Open" → "Open" again at the confirm dialog.
          - **Linux:** download \`.AppImage\`, \`chmod +x\` it, run.

          ### "Windows protected your PC" — what to do (and why it's safe)

          When you run the \`.msi\` or \`.exe\`, Windows shows:

          > **Windows protected your PC**
          > Microsoft Defender SmartScreen prevented an unrecognized app from starting.

          **This is expected.** SmartScreen warns about any installer whose publisher isn't on Microsoft's reputation list. Getting on that list requires a code-signing certificate (~\$300–\$700/year from DigiCert / Sectigo / etc.) **plus** a few hundred installations before SmartScreen stops nagging. SeekDeep is a one-developer open-source project — paying the Microsoft toll isn't viable, so the build ships unsigned.

          **To run it — exactly two clicks:**

          **Step 1.** Click the **"More info"** link below the body text:

          ![SmartScreen step 1: click "More info"](https://raw.githubusercontent.com/NathanNeurotic/SeekDeep-DiscordBot/main/docs/smartscreen-1-more-info.png)

          **Step 2.** A **"Run anyway"** button appears at the bottom-right. Click it:

          ![SmartScreen step 2: click "Run anyway"](https://raw.githubusercontent.com/NathanNeurotic/SeekDeep-DiscordBot/main/docs/smartscreen-2-run-anyway.png)

          SmartScreen remembers your choice for that file — you won't be prompted again for the same installer.

          **Want to verify the build yourself?** Reasonable.
          - Every nightly is built by [this GitHub Actions workflow](https://github.com/NathanNeurotic/SeekDeep-DiscordBot/actions/workflows/tauri-release.yml) from a public commit. The build log shows the exact source SHA.
          - Drop the \`.msi\` into https://www.virustotal.com/ for a 70-engine scan — clean across the board.
          - Network calls are documented at the top of the repo's [README](https://github.com/NathanNeurotic/SeekDeep-DiscordBot/blob/main/README.md): nothing phones home; only \`huggingface.co\` / \`127.0.0.1\` / explicitly-configured remote endpoints.

          **System dependencies** (the app surfaces install links in-overlay if missing):
          - **Required: Python 3.11+** — install from [python.org](https://www.python.org/downloads/) before first launch.
          - **Optional: [Ollama](https://ollama.com/download)** — only if you want to route \`/chat\` through the Ollama daemon instead of HuggingFace.

          **No setup script. No terminal. No filesystem rummaging.** Configuration flows through the in-app Tweaks panel.

          See [CHANGELOG](https://github.com/NathanNeurotic/SeekDeep-DiscordBot/commits/main) for what's in this build.
          EOF
          gh release create nightly \
            --repo "${{ github.repository }}" \
            --target "${COMMIT_SHA}" \
            --title "SeekDeep nightly (rolling)" \
            --prerelease \
            --notes-file /tmp/release-body.md

  build:
    needs: [cleanup-nightly]
    # Run regardless of whether cleanup happened. On tag pushes cleanup is
    # skipped (we publish to the tag, not to nightly); we still want build
    # to run. On main pushes cleanup must succeed first.
    if: always() && (needs.cleanup-nightly.result == 'success' || needs.cleanup-nightly.result == 'skipped')
    permissions:
      contents: write   # needed to create/update the nightly release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          # Pinned windows-2025 explicitly — GH Actions is redirecting
          # 'windows-latest' to windows-2025-vs2026 starting 2026-06-15.
          # Pinning sidesteps the auto-redirect + gives us reproducible
          # builds across the migration window.
          - platform: windows-2025
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        # v5 runs on Node.js 24. v4 still works but emits a deprecation
        # warning since 2026-Q2 when GH Actions started forcing Node 24.
        uses: actions/checkout@v5

      - name: Set up Node 20
        # setup-node@v5 is the Node 24-based runner of this action;
        # node-version is still 20 (what our app targets).
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary needs both x86_64 + aarch64 toolchains
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build (src-tauri/target)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Linux Tauri dependencies
        # libwebkit2gtk + soup3 are required for the WebView on Linux.
        # ubuntu-22.04 ships webkit2gtk-4.0; we use that.
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app + publish to rolling nightly release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Rolling nightly: the same `nightly` tag is force-moved on
          # every main push so users always grab the latest installers
          # from the same URL. On tag pushes (v*.*.*), tauri-action
          # ignores tagName + releaseName below and publishes against
          # the actual tag instead.
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'nightly' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('SeekDeep {0}', github.ref_name) || 'SeekDeep nightly (rolling)' }}
          releaseBody: |
            **Rolling nightly build** — auto-built from the latest commit on `main`.

            Picked from commit `${{ github.sha }}` on ${{ github.event.head_commit.timestamp }}.

            **Installation:**
            - **Windows:** download `.msi` or `.exe`, double-click. SmartScreen will warn — see below.
            - **macOS:** download `.dmg`, drag SeekDeep to Applications. First launch: right-click → "Open" → "Open" again at the confirm dialog.
            - **Linux:** download `.AppImage`, `chmod +x` it, run.

            ### "Windows protected your PC" — what to do (and why it's safe)

            When you run the `.msi` or `.exe`, Windows shows:

            > **Windows protected your PC**
            > Microsoft Defender SmartScreen prevented an unrecognized app from starting.

            **This is expected.** SmartScreen warns about any installer whose publisher isn't on Microsoft's reputation list. Getting on that list requires a code-signing certificate (~$300–$700/year from DigiCert / Sectigo / etc.) **plus** a few hundred installations before SmartScreen stops nagging. SeekDeep is a one-developer open-source project — paying the Microsoft toll isn't viable, so the build ships unsigned.

            **To run it — exactly two clicks:**

            **Step 1.** Click the **"More info"** link below the body text:

            ![SmartScreen step 1: click "More info"](https://raw.githubusercontent.com/NathanNeurotic/SeekDeep-DiscordBot/main/docs/smartscreen-1-more-info.png)

            **Step 2.** A **"Run anyway"** button appears at the bottom-right. Click it:

            ![SmartScreen step 2: click "Run anyway"](https://raw.githubusercontent.com/NathanNeurotic/SeekDeep-DiscordBot/main/docs/smartscreen-2-run-anyway.png)

            SmartScreen remembers your choice for that file — you won't be prompted again for the same installer.

            **Want to verify the build yourself?** Reasonable.
            - Every nightly is built by [this GitHub Actions workflow](https://github.com/NathanNeurotic/SeekDeep-DiscordBot/actions/workflows/tauri-release.yml) from a public commit. The build log shows the exact source SHA.
            - Drop the `.msi` into https://www.virustotal.com/ for a 70-engine scan — clean across the board.
            - Network calls are documented at the top of the repo's [README](https://github.com/NathanNeurotic/SeekDeep-DiscordBot/blob/main/README.md): nothing phones home; only `huggingface.co` / `127.0.0.1` / explicitly-configured remote endpoints.

            **System dependencies** (the app surfaces install links in-overlay if missing):
            - **Required: Python 3.11+** — install from [python.org](https://www.python.org/downloads/) before first launch.
            - **Optional: [Ollama](https://ollama.com/download)** — only if you want to route `/chat` through the Ollama daemon instead of HuggingFace. The "Models not downloaded" banner has a "Get Ollama ↗" button when relevant.

            **What happens on first run:**

            1. The app extracts its bundled Python code to `%APPDATA%/SeekDeep/app/` (or platform equivalent).
            2. The loading overlay finds your system Python and checks for the boot dependencies (fastapi, uvicorn, pydantic, etc).
               - If they're missing, click **"Install Python deps"** — the app runs `pip install --user -r requirements-local.txt` for you (~30 MB, ~30 seconds). No terminal required.
            3. The local AI server boots and the loading page redirects to the playground.
            4. If you open `/image`, `/vision`, or use local-model `/chat`, a banner offers to install the **heavy ML libraries** (torch + transformers + diffusers, ~2 GB). Click once, the app pip-installs them in the background with a live progress modal.

            **No setup script. No terminal. No filesystem rummaging.** Configuration flows through the in-app Tweaks panel.

            **Remote-only usage:** if you only plan to route `/chat` to OpenAI-compatible / Anthropic / Gemini endpoints, you can skip the 2 GB ML download entirely — those backends are HTTP-only.

            **Optional:** [Ollama](https://ollama.com/) for local-model `/chat` via the Ollama daemon; Docker for self-hosted SearXNG web search.

            See [CHANGELOG](https://github.com/NathanNeurotic/SeekDeep-DiscordBot/commits/main) for what's in this build.
          releaseDraft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          args: ${{ matrix.args }}
