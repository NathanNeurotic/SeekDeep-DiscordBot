<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekDeep</title>

    <meta http-equiv="refresh" content="0; url=https://nathanneurotic.github.io/SeekDeep-DiscordBot/gui/">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: #0b0d10;
            color: #e7edf5;
            text-align: center;
        }

        main {
            width: min(720px, calc(100% - 32px));
            padding: 32px;
            border: 1px solid #263241;
            border-radius: 18px;
            background: #12161c;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(36px, 8vw, 72px);
            letter-spacing: -0.05em;
        }

        p {
            margin: 0 0 18px;
            color: #a8b3c2;
            font-size: 18px;
        }

        a {
            color: #7dd3fc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <main>
        <h1>SeekDeep</h1>
        <p>Entering the SeekDeep Discord Bot GUI...</p>
        <p>
            If you are not redirected automatically,
            <a href="https://nathanneurotic.github.io/SeekDeep-DiscordBot/gui/">open the GUI here</a>.
        </p>
    </main>
</body>
</html>
