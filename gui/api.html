<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SeekDeep — API Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { overflow: hidden; }
  .app-wrap { height: 100vh; padding: 24px; display: grid; place-items: center; }

  .win {
    width: 100%; max-width: 1500px;
    height: calc(100vh - 48px);
    display: grid;
    grid-template-rows: 44px 1fr;
    border-radius: var(--r-md);
    overflow: hidden;
    border: 1px solid rgba(45,212,255,0.25);
    background:
      linear-gradient(rgba(45,212,255,0.03) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(90deg, rgba(45,212,255,0.03) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(180deg, var(--substrate-2) 0%, var(--substrate) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      inset 0 -1px 0 rgba(0,0,0,0.5),
      inset 0 0 0 1px rgba(0,0,0,0.35),
      inset 0 0 60px rgba(45,212,255,0.04),
      0 50px 120px rgba(0,0,0,0.8),
      0 0 100px rgba(45,212,255,0.10);
    position: relative;
  }
  .win::before {
    content: ""; position: absolute;
    inset: 10px;
    pointer-events: none;
    background:
      linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 1px 22px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) top right / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) top right / 1px 22px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom left / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom left / 1px 22px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 1px 22px no-repeat;
    filter: drop-shadow(0 0 6px rgba(109,240,255,0.55));
    z-index: 0;
  }
  .win > * { position: relative; z-index: 1; }

  .win-titlebar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 16px;
    background: linear-gradient(180deg, rgba(20,48,107,0.95), rgba(8,20,52,0.95));
    border-bottom: 1px solid var(--stroke);
  }
  .win-titlebar .left { display: flex; align-items: center; gap: 12px; }
  .win-titlebar .left img { width: 22px; height: 22px; }
  .win-titlebar .title {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.16em; color: var(--hull-2);
    text-transform: uppercase;
  }
  .win-titlebar .title em { font-style: normal; color: var(--cyan-1); }
  .win-titlebar .right { justify-self: end; display: flex; gap: 4px; }
  .win-titlebar .right a {
    display: flex; align-items: center; padding: 0 10px; height: 26px;
    color: var(--hull-3); font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; text-decoration: none;
    border-radius: var(--r-sm);
  }
  .win-titlebar .right a:hover { color: var(--cyan-1); background: rgba(45,212,255,0.08); }

  /* Body — 3-col layout */
  .body {
    display: grid;
    grid-template-columns: 240px 1fr 1fr;
    overflow: hidden;
    min-height: 0;
  }

  /* Endpoint sidebar */
  .ep-rail {
    background: rgba(2,6,15,0.55);
    border-right: 1px solid var(--stroke);
    overflow-y: auto;
    padding: 16px 12px;
  }
  .ep-rail .grp {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--hull-3);
    padding: 6px 10px 6px;
    margin: 14px 0 6px;
    border-bottom: 1px solid var(--stroke);
  }
  .ep-rail .grp:first-child { margin-top: 0; }
  .ep {
    display: grid;
    grid-template-columns: 38px 1fr;
    gap: 10px;
    align-items: center;
    padding: 9px 10px;
    margin: 2px 0;
    border-radius: var(--r-sm);
    cursor: pointer;
    color: var(--hull-2);
    font-family: var(--font-mono);
    border: 1px solid transparent;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .ep:hover { background: rgba(45,212,255,0.06); color: var(--hull); }
  .ep.active {
    background: rgba(45,212,255,0.10);
    color: var(--cyan-1);
    border-color: rgba(45,212,255,0.30);
    box-shadow: inset 0 0 20px rgba(45,212,255,0.04);
  }
  .ep .method {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-align: center;
    padding: 3px 0;
    border-radius: 2px;
    font-weight: 600;
    border: 1px solid currentColor;
    background: rgba(0,0,0,0.3);
  }
  .ep .method.get  { color: var(--good); }
  .ep .method.post { color: var(--cyan-1); }
  .ep .path { font-size: 12px; letter-spacing: 0.02em; }

  /* Request pane */
  .req {
    overflow-y: auto;
    padding: 22px 24px;
    border-right: 1px solid var(--stroke);
    min-width: 0;
  }
  .req-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 12px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--stroke);
  }
  .req-head h2 {
    font-size: 22px; letter-spacing: -0.01em; margin: 0;
    font-family: var(--font-mono);
  }
  .req-head h2 .method { color: var(--cyan-1); margin-right: 8px; font-size: 14px; }
  .req-head .endpoint-meta {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; color: var(--hull-3);
    text-transform: uppercase;
  }
  .req-desc {
    color: var(--hull-3);
    font-size: 13px; line-height: 1.55;
    margin: 0 0 16px;
    max-width: 70ch;
  }
  .req-desc .mono { color: var(--cyan-1); }

  .field {
    display: flex; flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }
  .field label {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--hull-3);
    display: flex; gap: 8px; align-items: baseline;
  }
  .field label .type {
    color: var(--cyan-1);
    font-size: 9px;
  }
  .field label .req-flag { color: var(--bad); }
  .field input, .field select, .field textarea {
    width: 100%; font-size: 13px;
    font-family: var(--font-mono);
  }
  .field textarea { min-height: 80px; resize: vertical; }
  .field .desc {
    color: var(--hull-3);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.5;
  }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .row-2 .field, .row-3 .field { margin-bottom: 0; }

  .send-row {
    display: flex; gap: 10px; align-items: center;
    margin: 20px 0 16px;
    padding-top: 16px;
    border-top: 1px solid var(--stroke);
  }
  .send-row .latency {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--hull-3); letter-spacing: 0.14em;
    margin-left: auto;
  }
  .send-row .latency em { font-style: normal; color: var(--cyan-1); }

  /* curl preview */
  .curl-preview {
    background: rgba(0,4,12,0.85);
    border: 1px solid rgba(45,212,255,0.22);
    border-radius: var(--r-md);
    font-family: var(--font-mono);
    font-size: 12px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .curl-preview .ch {
    padding: 8px 12px;
    background: rgba(8,20,52,0.7);
    border-bottom: 1px solid var(--stroke);
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--hull-3);
    display: flex; justify-content: space-between;
  }
  .curl-preview pre {
    margin: 0; padding: 14px;
    color: var(--hull);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .curl-preview pre .pmt { color: var(--cyan-1); }
  .curl-preview pre .key { color: #c47bff; }
  .curl-preview pre .str { color: var(--good); }
  .copy-btn {
    background: transparent;
    border: 1px solid rgba(45,212,255,0.30);
    color: var(--cyan-1);
    font-family: var(--font-mono);
    font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: var(--r-sm);
    cursor: pointer;
  }
  .copy-btn:hover { background: rgba(45,212,255,0.12); }
  .copy-btn.copied { background: var(--good); color: var(--ink); border-color: var(--good); }

  /* Response pane */
  .resp {
    overflow-y: auto;
    padding: 22px 24px;
    background: rgba(2,6,15,0.35);
    min-width: 0;
  }
  .resp-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 12px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--stroke);
  }
  .resp-head h2 {
    font-size: 22px; letter-spacing: -0.01em; margin: 0;
    font-family: var(--font-mono);
  }
  .resp-status {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 12px;
    border-radius: var(--r-sm);
    border: 1px solid currentColor;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em;
    background: rgba(0,0,0,0.3);
  }
  .resp-status.idle { color: var(--hull-3); }
  .resp-status.loading {
    color: var(--warn);
    animation: pulseStatus 1.2s ease-in-out infinite;
  }
  .resp-status.ok { color: var(--good); }
  .resp-status.err { color: var(--bad); }
  @keyframes pulseStatus {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .resp-meta {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .resp-meta-tile {
    padding: 10px 12px;
    background: linear-gradient(180deg, var(--substrate-2), var(--substrate));
    border: 1px solid rgba(45,212,255,0.20);
    border-radius: var(--r-sm);
  }
  .resp-meta-tile .lbl {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.18em; color: var(--hull-3);
    text-transform: uppercase;
  }
  .resp-meta-tile .v {
    font-family: var(--font-mono); font-size: 14px;
    color: var(--cyan-1);
    margin-top: 3px;
  }

  .resp-body {
    background: rgba(0,4,12,0.85);
    border: 1px solid rgba(45,212,255,0.22);
    border-radius: var(--r-md);
    font-family: var(--font-mono); font-size: 12px;
    overflow: hidden;
  }
  .resp-body .rh {
    padding: 8px 12px;
    background: rgba(8,20,52,0.7);
    border-bottom: 1px solid var(--stroke);
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--hull-3);
    display: flex; justify-content: space-between; align-items: center;
  }
  .resp-body pre {
    margin: 0; padding: 14px;
    color: var(--hull);
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 50vh;
    overflow-y: auto;
  }
  .resp-body pre .key { color: var(--cyan-1); }
  .resp-body pre .str { color: var(--good); }
  .resp-body pre .num { color: var(--warn); }
  .resp-body pre .bool { color: #c47bff; }
  .resp-body pre .null { color: var(--hull-3); }

  .resp-empty {
    padding: 40px;
    text-align: center;
    color: var(--hull-3);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.1em;
  }
  .resp-empty em { color: var(--cyan-1); font-style: normal; }

  /* Image response */
  .resp-image {
    aspect-ratio: 1;
    background:
      repeating-linear-gradient(45deg, rgba(45,212,255,0.04) 0 10px, transparent 10px 20px),
      linear-gradient(135deg, var(--abyss-3), var(--abyss-1));
    border-radius: var(--r-md);
    border: 1px solid rgba(45,212,255,0.22);
    display: grid; place-items: center;
    color: var(--hull-3);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-top: 12px;
  }
  .resp-image img { max-width: 100%; max-height: 100%; }
</style>
</head>
<body>
<div class="abyss"></div>
<div class="rays"></div>
<div class="bubbles">
  <span style="left:4%;animation-duration:24s;animation-delay:-3s"></span>
  <span class="cube sm" style="left:10%;animation-duration:38s;animation-delay:-8s"></span>
  <span style="left:14%;animation-duration:30s;animation-delay:-12s"></span>
  <span class="cube" style="left:28%;animation-duration:42s;animation-delay:-22s"></span>
  <span style="left:48%;animation-duration:22s;animation-delay:-2s;width:2px;height:2px"></span>
  <span class="cube big" style="left:54%;animation-duration:48s;animation-delay:-30s"></span>
  <span style="left:67%;animation-duration:20s;animation-delay:-14s"></span>
  <span class="cube" style="left:84%;animation-duration:44s;animation-delay:-25s"></span>
  <span style="left:95%;animation-duration:19s;animation-delay:-4s;width:2px;height:2px"></span>
</div>

<div class="app-wrap">
  <div class="win">

    <div class="win-titlebar">
      <div class="left">
        <img src="assets/seekdeep-mark.gif" alt="" />
        <span class="title">SEEK<em>DEEP</em> · API EXPLORER · :7865<span class="cur"></span></span>
        <span class="pill" id="liveModePill" title="probes /health on first send" style="margin-left: 12px; font-size: 9px;"><span class="dot"></span>STANDBY</span>
      </div>
      <div></div>
      <div class="right">
        <a href="index.html">↩ HUB</a>
        <a href="installer.html">⚙ INSTALLER</a>
        <a href="docs.html">▤ DOCS</a>
        <a href="roadmap.html">▦ ROADMAP</a>
        <a href="architecture.html">⌬ ARCH</a>
        <a href="app.html">⌘ CONTROL CENTER</a>
      </div>
    </div>

    <div class="body">

      <!-- ENDPOINT RAIL -->
      <nav class="ep-rail" id="epRail"></nav>

      <!-- REQUEST PANE -->
      <section class="req" id="reqPane"></section>

      <!-- RESPONSE PANE -->
      <section class="resp" id="respPane">
        <div class="resp-head">
          <h2>RESPONSE</h2>
          <span class="resp-status idle" id="respStatus">IDLE</span>
        </div>
        <div class="resp-empty">▸ <em>Send a request</em> to see the response here.<br/><br/>Standby until first send · then the LIVE/MOCK pill in the title bar reflects whether the local AI server is reachable.</div>
      </section>

    </div>
  </div>
</div>

<script>
// ===========================================================
// ENDPOINT CATALOG
// ===========================================================
// Smart BASE — when served from local_ai_server.py via /gui mount, use same origin.
// When opened directly (file://) or from another origin, fall back to :7865.
const SEEKDEEP_BASE = (function() {
  if (typeof window === 'undefined') return 'http://127.0.0.1:7865';
  const sameOrigin = window.location.protocol === 'http:' || window.location.protocol === 'https:';
  if (sameOrigin && window.location.host) {
    // Drop the /gui prefix if present
    return window.location.origin;
  }
  return 'http://127.0.0.1:7865';
})();
const BASE = SEEKDEEP_BASE;

const ENDPOINTS = [
  // ======== HEALTH ========
  {
    group: 'STATUS',
    id: 'health', method: 'GET', path: '/health',
    title: 'Health',
    desc: 'Probe the local AI server. Returns currently-loaded model, CUDA state, keep-resident flags, and a nested <span class="mono">gpu</span> object with VRAM breakdown.',
    fields: [],
  },
  {
    group: 'STATUS',
    id: 'gpu', method: 'GET', path: '/gpu',
    title: 'GPU Snapshot',
    desc: 'One-shot VRAM read. Returns allocated / reserved / free / total MB plus utilization percentages and device name.',
    fields: [],
  },

  // ======== CHAT ========
  {
    group: 'GENERATION',
    id: 'chat', method: 'POST', path: '/chat',
    title: 'Chat',
    desc: 'Role-routed text generation. <span class="mono">role</span> selects which chat model loads: <span class="mono">default_chat</span> (Llama-3.1-8B), <span class="mono">quality_text</span>, <span class="mono">reasoning_code</span>, <span class="mono">lightweight_chat</span>, or <span class="mono">fallback_chat</span>.',
    fields: [
      { key: 'prompt', label: 'Prompt', type: 'textarea', required: true, default: 'What is bioluminescence?' },
      { key: 'role', label: 'Role', type: 'select', options: ['default_chat','quality_text','reasoning_code','lightweight_chat','fallback_chat'], default: 'default_chat' },
      { key: 'temperature', label: 'Temperature', type: 'number', default: 0.7, step: 0.05, min: 0, max: 2 },
      { key: 'max_new_tokens', label: 'Max new tokens', type: 'number', default: 1024 },
      { key: 'system_prompt', label: 'System prompt (optional)', type: 'textarea', default: '' },
    ],
  },

  // ======== IMAGE ========
  {
    group: 'GENERATION',
    id: 'image', method: 'POST', path: '/image',
    title: 'Image · txt2img',
    desc: 'SDXL generation through Dreamshaper-XL. <span class="mono">steps</span> 12/28/40 maps to quality low/standard/high. Default scheduler is <span class="mono">dpmsolver++</span>.',
    fields: [
      { key: 'prompt', label: 'Prompt', type: 'textarea', required: true, default: 'a colossal squid silhouetted at 10000m, bioluminescent, cinematic' },
      { key: 'negative_prompt', label: 'Negative prompt', type: 'textarea', default: 'blurry, low quality, watermark, signature' },
      { key: 'width', label: 'Width', type: 'number', default: 1024 },
      { key: 'height', label: 'Height', type: 'number', default: 1024 },
      { key: 'steps', label: 'Steps', type: 'number', default: 28 },
      { key: 'guidance_scale', label: 'Guidance scale', type: 'number', default: 7.0, step: 0.5 },
      { key: 'seed', label: 'Seed (-1 random)', type: 'number', default: -1 },
    ],
  },

  // ======== IMG2IMG ========
  {
    group: 'GENERATION',
    id: 'img2img', method: 'POST', path: '/img2img',
    title: 'Image · img2img',
    desc: 'Transform an image with a text prompt. Strength 0.05-1.0 — higher = more deviation from source. Reuses the Dreamshaper-XL pipeline.',
    fields: [
      { key: 'prompt', label: 'Prompt', type: 'textarea', required: true, default: 'same scene, black and white, film grain' },
      { key: 'image_b64', label: 'Image (base64)', type: 'textarea', default: '', desc: 'PNG/JPEG bytes encoded as base64. Server expects raw bytes or data-URI prefix.' },
      { key: 'strength', label: 'Strength', type: 'number', default: 0.6, step: 0.05, min: 0.05, max: 1 },
      { key: 'guidance_scale', label: 'Guidance scale', type: 'number', default: 5.0, step: 0.5 },
      { key: 'steps', label: 'Steps', type: 'number', default: 28 },
    ],
  },

  // ======== VISION ========
  {
    group: 'GENERATION',
    id: 'vision', method: 'POST', path: '/vision',
    title: 'Vision',
    desc: 'Qwen2.5-VL describes or OCRs an image. <span class="mono">mode</span>: <span class="mono">describe</span> (default) or <span class="mono">ocr</span>.',
    fields: [
      { key: 'prompt', label: 'Question', type: 'textarea', default: 'What is in this image?' },
      { key: 'image_b64', label: 'Image (base64)', type: 'textarea', default: '' },
      { key: 'mode', label: 'Mode', type: 'select', options: ['describe','ocr'], default: 'describe' },
      { key: 'max_new_tokens', label: 'Max tokens', type: 'number', default: 700 },
    ],
  },

  // ======== PIX2PIX ========
  {
    group: 'EDIT',
    id: 'pix2pix', method: 'POST', path: '/instruct-pix2pix',
    title: 'InstructPix2Pix',
    desc: 'Natural-language image editing — "make it darker", "add snow". Gated behind <span class="mono">SEEKDEEP_FEATURE_INSTRUCT_PIX2PIX=on</span>.',
    fields: [
      { key: 'instruction', label: 'Instruction', type: 'textarea', required: true, default: 'make it darker' },
      { key: 'image_b64', label: 'Image (base64)', type: 'textarea', default: '' },
      { key: 'image_guidance_scale', label: 'Image guidance', type: 'number', default: 1.5, step: 0.1 },
      { key: 'guidance_scale', label: 'Text guidance', type: 'number', default: 9.0, step: 0.5 },
      { key: 'steps', label: 'Steps', type: 'number', default: 30 },
    ],
  },

  // ======== INPAINT ========
  {
    group: 'EDIT',
    id: 'inpaint', method: 'POST', path: '/inpaint',
    title: 'Inpaint · CLIPSeg + SDXL',
    desc: 'CLIPSeg builds an auto-mask from <span class="mono">remove</span>, then SDXL fills it. Gated behind <span class="mono">SEEKDEEP_FEATURE_INPAINT=on</span>.',
    fields: [
      { key: 'remove', label: 'Target to remove', type: 'text', required: true, default: 'the wizard' },
      { key: 'prompt', label: 'Replacement context', type: 'textarea', default: 'forest clearing, soft light' },
      { key: 'image_b64', label: 'Image (base64)', type: 'textarea', default: '' },
      { key: 'guidance_scale', label: 'Guidance scale', type: 'number', default: 5.0, step: 0.5 },
      { key: 'strength', label: 'Strength', type: 'number', default: 0.95, step: 0.05 },
      { key: 'steps', label: 'Steps', type: 'number', default: 30 },
    ],
  },

  // ======== UPSCALE ========
  {
    group: 'EDIT',
    id: 'upscale', method: 'POST', path: '/upscale',
    title: 'Upscale',
    desc: 'PIL Lanczos upscale with optional mild sharpening. <span class="mono">SEEKDEEP_UPSCALE_*</span> env knobs override sharpen radius/percent/threshold.',
    fields: [
      { key: 'image_b64', label: 'Image (base64)', type: 'textarea', default: '' },
      { key: 'scale', label: 'Scale', type: 'select', options: ['2','3','4'], default: '2' },
      { key: 'method', label: 'Method', type: 'select', options: ['lanczos','realesrgan'], default: 'lanczos' },
    ],
  },

  // ======== CHART ========
  {
    group: 'TOOLING',
    id: 'chart', method: 'POST', path: '/chart',
    title: 'Stats Chart',
    desc: 'Renders 30-day activity as a matplotlib line chart (Discord dark theme). Powers <span class="mono">@SeekDeep stats chart</span>.',
    fields: [
      { key: 'day_buckets', label: 'Day buckets (JSON)', type: 'textarea', default: '{"images":[2,4,3,8,12,6,9,11,7,10],"chats":[5,3,8,12,6,9,11,7,10,14],"vision":[1,0,2,1,3,2,1,4,2,1]}', desc: '3 arrays of equal length: <span class="mono">images</span>, <span class="mono">chats</span>, <span class="mono">vision</span>.' },
      { key: 'title', label: 'Chart title', type: 'text', default: 'SeekDeep · last 30 days' },
    ],
  },

  // ======== UNLOAD ========
  {
    group: 'TOOLING',
    id: 'unload', method: 'POST', path: '/unload',
    title: 'Unload',
    desc: 'Force-unload the currently resident model and clear CUDA cache. Useful when the task-LRU isn\'t aggressive enough.',
    fields: [],
  },
];

// ===========================================================
// RAIL
// ===========================================================
const railEl = document.getElementById('epRail');
const groups = {};
ENDPOINTS.forEach(e => { groups[e.group] = groups[e.group] || []; groups[e.group].push(e); });
Object.entries(groups).forEach(([group, list]) => {
  const h = document.createElement('div');
  h.className = 'grp';
  h.textContent = group;
  railEl.appendChild(h);
  list.forEach(ep => {
    const el = document.createElement('div');
    el.className = 'ep';
    el.dataset.id = ep.id;
    el.innerHTML = `<span class="method ${ep.method.toLowerCase()}">${ep.method}</span><span class="path">${ep.path}</span>`;
    el.addEventListener('click', () => selectEndpoint(ep.id));
    railEl.appendChild(el);
  });
});

// ===========================================================
// STATE
// ===========================================================
const STATE_KEY = 'seekdeep-api-explorer-v1';
let state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
state.currentId = state.currentId || ENDPOINTS[0].id;
state.values = state.values || {};
function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

// ===========================================================
// REQUEST PANE RENDERER
// ===========================================================
const reqPane = document.getElementById('reqPane');
function currentEp() { return ENDPOINTS.find(e => e.id === state.currentId); }

function fieldEl(ep, f) {
  const v = (state.values[ep.id] && state.values[ep.id][f.key] != null)
    ? state.values[ep.id][f.key] : f.default;
  let control;
  if (f.type === 'textarea') {
    control = `<textarea data-key="${f.key}" placeholder="${(f.default||'').toString().replace(/"/g,'&quot;')}">${escape(v ?? '')}</textarea>`;
  } else if (f.type === 'select') {
    const opts = f.options.map(o => `<option value="${o}" ${o == v ? 'selected':''}>${o}</option>`).join('');
    control = `<select data-key="${f.key}">${opts}</select>`;
  } else if (f.type === 'number') {
    control = `<input type="number" data-key="${f.key}" value="${v ?? ''}" ${f.step?`step="${f.step}"`:''} ${f.min!=null?`min="${f.min}"`:''} ${f.max!=null?`max="${f.max}"`:''} />`;
  } else {
    control = `<input type="text" data-key="${f.key}" value="${escapeAttr(v ?? '')}" />`;
  }
  return `
    <div class="field">
      <label>
        <span>${f.label}</span>
        <span class="type">${f.type}</span>
        ${f.required ? '<span class="req-flag">REQUIRED</span>' : ''}
      </label>
      ${control}
      ${f.desc ? `<div class="desc">${f.desc}</div>` : ''}
    </div>
  `;
}

function renderRequest() {
  const ep = currentEp();
  document.querySelectorAll('.ep').forEach(el => el.classList.toggle('active', el.dataset.id === ep.id));

  const fieldsHTML = ep.fields.length
    ? ep.fields.map(f => fieldEl(ep, f)).join('')
    : '<div class="req-desc" style="color:var(--hull-3); font-family: var(--font-mono); font-size: 12px;">▸ No request body. Just <strong style="color:var(--cyan-1);">SEND</strong>.</div>';

  reqPane.innerHTML = `
    <div class="req-head">
      <h2><span class="method">${ep.method}</span>${ep.path}</h2>
      <span class="endpoint-meta">▸ ${ep.title}</span>
    </div>
    <p class="req-desc">${ep.desc}</p>
    ${fieldsHTML}
    <div class="send-row">
      <button class="btn btn-primary" id="sendBtn">▸ Send request</button>
      <button class="btn btn-ghost" id="resetBtn">Reset</button>
      <span class="latency" id="latencyLbl"></span>
    </div>
    <div class="curl-preview" id="curlPreview">
      <div class="ch"><span>CURL · <em style="font-style:normal; color:var(--cyan-1);">EQUIVALENT</em></span><button class="copy-btn" id="copyCurl">COPY</button></div>
      <pre id="curlBody"></pre>
    </div>
  `;

  // Field input listeners — persist values
  reqPane.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('input', () => {
      state.values[ep.id] = state.values[ep.id] || {};
      state.values[ep.id][el.dataset.key] = el.value;
      saveState();
      refreshCurl();
    });
  });
  document.getElementById('sendBtn').addEventListener('click', sendRequest);
  document.getElementById('resetBtn').addEventListener('click', () => {
    delete state.values[ep.id];
    saveState();
    renderRequest();
    refreshCurl();
  });
  document.getElementById('copyCurl').addEventListener('click', (e) => {
    const txt = document.getElementById('curlBody').innerText;
    navigator.clipboard.writeText(txt).then(() => {
      const b = e.currentTarget;
      const orig = b.textContent;
      b.textContent = '✓ COPIED'; b.classList.add('copied');
      setTimeout(() => { b.textContent = orig; b.classList.remove('copied'); }, 1500);
    });
  });
  refreshCurl();
}

function buildBody() {
  const ep = currentEp();
  if (ep.method === 'GET' || ep.fields.length === 0) return null;
  const body = {};
  ep.fields.forEach(f => {
    let v = (state.values[ep.id] && state.values[ep.id][f.key] != null)
      ? state.values[ep.id][f.key] : f.default;
    if (f.type === 'number') v = (v === '' || v == null) ? null : Number(v);
    if (f.key === 'day_buckets' && typeof v === 'string') {
      try { v = JSON.parse(v); } catch {}
    }
    if (v !== '' && v != null) body[f.key] = v;
  });
  return body;
}

function refreshCurl() {
  const ep = currentEp();
  const body = buildBody();
  let curl = `<span class="pmt">$</span> curl -X ${ep.method} ${BASE}${ep.path}`;
  if (body) {
    curl += ` \\\n      -H "Content-Type: application/json" \\\n      -d '${prettyJSON(body, true)}'`;
  }
  document.getElementById('curlBody').innerHTML = curl;
}

function escape(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s) {
  return String(s).replace(/"/g,'&quot;');
}

// ===========================================================
// JSON PRETTY-PRINTER + SYNTAX HIGHLIGHTER
// ===========================================================
function prettyJSON(obj, plain = false) {
  let s = JSON.stringify(obj, null, 2);
  if (plain) return s;
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(?:\\.|[^"\\])*"):/g, '<span class="key">$1</span>:')
    .replace(/: "((?:\\.|[^"\\])*)"/g, ': <span class="str">"$1"</span>')
    .replace(/: (-?\d+(?:\.\d+)?(?:e[+-]?\d+)?)/gi, ': <span class="num">$1</span>')
    .replace(/: (true|false)/g, ': <span class="bool">$1</span>')
    .replace(/: (null)/g, ': <span class="null">$1</span>');
}

// ===========================================================
// SEND REQUEST
// ===========================================================
const respPane = document.getElementById('respPane');
function setLiveMode(mode) {
  const pill = document.getElementById('liveModePill');
  if (mode === 'live') {
    pill.classList.add('on'); pill.classList.remove('warn');
    pill.innerHTML = '<span class="dot"></span>LIVE · :7865';
  } else if (mode === 'mock') {
    pill.classList.remove('on'); pill.classList.add('warn');
    pill.innerHTML = '<span class="dot"></span>MOCK · OFFLINE';
  } else {
    pill.classList.remove('on'); pill.classList.remove('warn');
    pill.innerHTML = '<span class="dot"></span>STANDBY';
  }
}

async function sendRequest() {
  const ep = currentEp();
  const body = buildBody();
  const t0 = performance.now();
  document.getElementById('latencyLbl').textContent = '';
  setStatus('loading');
  respPane.querySelector('.resp-empty')?.remove();
  // try real fetch
  let response = null, ok = false, error = null;
  try {
    const opts = { method: ep.method, signal: AbortSignal.timeout(15000), cache: 'no-store' };
    if (body) {
      opts.headers = { 'Content-Type': 'application/json' };
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(BASE + ep.path, opts);
    const dt = Math.round(performance.now() - t0);
    const ct = r.headers.get('Content-Type') || '';
    if (ct.includes('image/')) {
      const blob = await r.blob();
      response = { __image: true, url: URL.createObjectURL(blob), size: blob.size, type: ct };
    } else {
      try { response = await r.json(); }
      catch { response = { raw: await r.text() }; }
    }
    ok = r.ok;
    renderResponse({ ep, ok, status: r.status, dt, body: response });
    setLiveMode('live');
  } catch (e) {
    const dt = Math.round(performance.now() - t0);
    error = String(e && e.message || e);
    setStatus('err');
    setLiveMode('mock');
    renderResponse({ ep, ok: false, status: 0, dt, body: mockResponse(ep, body), error });
  }
}

function setStatus(s, code) {
  const el = document.getElementById('respStatus');
  if (!el) return;
  el.className = 'resp-status ' + s;
  el.textContent = (s === 'ok' ? '200 OK' : s === 'err' ? 'OFFLINE · MOCK' : s === 'loading' ? 'SENDING…' : 'IDLE').replace('200', code || '200');
}

function renderResponse({ ep, ok, status, dt, body, error }) {
  setStatus(ok ? 'ok' : 'err', status);
  document.getElementById('latencyLbl').innerHTML = `▸ <em>${dt}</em> ms · ${ok ? status + ' OK' : (status || 'OFFLINE')}`;
  const meta = `
    <div class="resp-meta">
      <div class="resp-meta-tile"><div class="lbl">STATUS</div><div class="v">${ok ? status + ' OK' : (status || 'offline')}</div></div>
      <div class="resp-meta-tile"><div class="lbl">LATENCY</div><div class="v">${dt} ms</div></div>
      <div class="resp-meta-tile"><div class="lbl">ENDPOINT</div><div class="v">${ep.method} ${ep.path}</div></div>
    </div>
  `;

  let bodyHTML;
  if (body && body.__image) {
    bodyHTML = `<div class="resp-image"><img src="${body.url}" alt="response image" /></div>`;
  } else {
    bodyHTML = `
      <div class="resp-body">
        <div class="rh"><span>RESPONSE BODY · <em style="font-style:normal; color:var(--cyan-1);">${ok ? 'LIVE' : 'MOCK (server offline)'}</em></span><button class="copy-btn" id="copyResp">COPY</button></div>
        <pre>${prettyJSON(body)}</pre>
      </div>
    `;
  }

  respPane.innerHTML = `
    <div class="resp-head">
      <h2>RESPONSE</h2>
      <span class="resp-status ${ok ? 'ok' : 'err'}" id="respStatus">${ok ? status + ' OK' : 'OFFLINE · MOCK'}</span>
    </div>
    ${error ? `<div style="color:var(--bad); font-family:var(--font-mono); font-size:12px; padding:8px 12px; background: rgba(255,107,107,0.05); border:1px solid rgba(255,107,107,0.3); border-radius: var(--r-sm); margin-bottom: 14px;">▸ FETCH ERROR · ${error} · showing canned mock response below</div>` : ''}
    ${meta}
    ${bodyHTML}
  `;
  // Wire copy button
  const cp = document.getElementById('copyResp');
  if (cp) {
    cp.addEventListener('click', e => {
      navigator.clipboard.writeText(prettyJSON(body, true)).then(() => {
        const orig = e.currentTarget.textContent;
        e.currentTarget.textContent = '✓ COPIED';
        e.currentTarget.classList.add('copied');
        setTimeout(() => { e.currentTarget.textContent = orig; e.currentTarget.classList.remove('copied'); }, 1500);
      });
    });
  }
}

// ===========================================================
// MOCK RESPONSES (when server is offline)
// ===========================================================
function mockResponse(ep, body) {
  switch (ep.id) {
    case 'health':
      return {
        device: 'cuda:0',
        cuda_available: true,
        model: 'meta-llama/Llama-3.1-8B-Instruct',
        loaded: 'default_chat',
        keep_resident: { default_chat: false, vision: false, image: false },
        gpu: { allocated_mb: 5240, reserved_mb: 6100, free_mb: 17800, total_mb: 24576, used_mb: 6100, used_pct: 24.8, reserved_pct: 24.8 }
      };
    case 'gpu':
      return {
        allocated_mb: 5240, reserved_mb: 6100, free_mb: 17800, total_mb: 24576,
        used_mb: 6100, used_pct: 24.8, reserved_pct: 24.8,
        loaded: 'default_chat',
        keep_resident: { default_chat: false, vision: false, image: false },
        device_name: 'NVIDIA GeForce RTX 4090 Laptop GPU'
      };
    case 'chat':
      return {
        role: body?.role || 'default_chat',
        model: 'meta-llama/Llama-3.1-8B-Instruct',
        response: 'Bioluminescence is the production and emission of light by living organisms, typically through a chemical reaction involving luciferin and luciferase. It is most common in marine creatures — anglerfish, dinoflagellates, ctenophores — where it functions as defense, mate attraction, or prey lure.',
        prompt_tokens: 14,
        completion_tokens: 84,
        elapsed_ms: 1240,
        web_search_used: false
      };
    case 'image':
      return {
        seed: 8842,
        steps: body?.steps || 28,
        scheduler: 'dpmsolver++',
        width: body?.width || 1024, height: body?.height || 1024,
        elapsed_ms: 16780,
        bytes: 1287456,
        prompt: body?.prompt || ''
      };
    case 'vision':
      return {
        model: 'Qwen/Qwen2.5-VL-3B-Instruct',
        mode: body?.mode || 'describe',
        response: 'A deep-sea cephalopod, likely a colossal squid (Mesonychoteuthis hamiltoni), in low-visibility water below 8000m. Bioluminescent dapples are visible along the mantle.',
        elapsed_ms: 1840
      };
    case 'pix2pix':
      return { ok: true, elapsed_ms: 5200, image_b64: '<binary png bytes elided>', note: 'mock — server offline' };
    case 'inpaint':
      return {
        target: body?.remove || '',
        mask_area_pct: 12.4,
        elapsed_ms: 8900,
        image_b64: '<binary png bytes elided>',
        note: 'mock — server offline'
      };
    case 'upscale':
      return { ok: true, scale: body?.scale || '2', method: body?.method || 'lanczos', elapsed_ms: 220, bytes: 4400000, note: 'mock — server offline' };
    case 'chart':
      return { ok: true, elapsed_ms: 480, format: 'png', bytes: 28400, note: 'mock — server offline' };
    case 'unload':
      return { ok: true, unloaded: 'default_chat', freed_mb: 5240 };
    default:
      return { note: 'no mock available' };
  }
}

// ===========================================================
// SELECTION
// ===========================================================
function selectEndpoint(id) {
  state.currentId = id;
  saveState();
  renderRequest();
}
renderRequest();
</script>
<script src="nav.js" defer></script>
</body>
</html>
