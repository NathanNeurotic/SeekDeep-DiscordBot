<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SeekDeep — API Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { overflow: hidden; }
  .app-wrap { height: 100vh; padding: 24px; display: grid; place-items: center; }

  .win {
    width: 100%; max-width: 1500px;
    height: calc(100vh - 48px);
    display: grid;
    grid-template-rows: 44px 1fr;
    border-radius: var(--r-md);
    overflow: hidden;
    border: 1px solid rgba(45,212,255,0.25);
    background:
      linear-gradient(rgba(45,212,255,0.03) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(90deg, rgba(45,212,255,0.03) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(180deg, var(--substrate-2) 0%, var(--substrate) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      inset 0 -1px 0 rgba(0,0,0,0.5),
      inset 0 0 0 1px rgba(0,0,0,0.35),
      inset 0 0 60px rgba(45,212,255,0.04),
      0 50px 120px rgba(0,0,0,0.8),
      0 0 100px rgba(45,212,255,0.10);
    position: relative;
  }
  .win::before {
    content: ""; position: absolute;
    inset: 10px;
    pointer-events: none;
    background:
      linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 1px 22px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) top right / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) top right / 1px 22px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom left / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom left / 1px 22px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 1px 22px no-repeat;
    filter: drop-shadow(0 0 6px rgba(109,240,255,0.55));
    z-index: 0;
  }
  .win > * { position: relative; z-index: 1; }

  .win-titlebar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 16px;
    background: linear-gradient(180deg, rgba(20,48,107,0.95), rgba(8,20,52,0.95));
    border-bottom: 1px solid var(--stroke);
  }
  .win-titlebar .left { display: flex; align-items: center; gap: 12px; }
  .win-titlebar .left img { width: 22px; height: 22px; }
  .win-titlebar .title {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.16em; color: var(--hull-2);
    text-transform: uppercase;
  }
  .win-titlebar .title em { font-style: normal; color: var(--cyan-1); }
  .win-titlebar .right { justify-self: end; display: flex; gap: 4px; }
  .win-titlebar .right a {
    display: flex; align-items: center; padding: 0 10px; height: 26px;
    color: var(--hull-3); font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; text-decoration: none;
    border-radius: var(--r-sm);
  }
  .win-titlebar .right a:hover { color: var(--cyan-1); background: rgba(45,212,255,0.08); }

  /* Body — 3-col layout */
  .body {
    display: grid;
    grid-template-columns: 240px 1fr 1fr;
    overflow: hidden;
    min-height: 0;
  }

  /* Endpoint sidebar */
  .ep-rail {
    background: rgba(2,6,15,0.55);
    border-right: 1px solid var(--stroke);
    overflow-y: auto;
    padding: 16px 12px;
  }
  .ep-rail .grp {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--hull-3);
    padding: 6px 10px 6px;
    margin: 14px 0 6px;
    border-bottom: 1px solid var(--stroke);
  }
  .ep-rail .grp:first-child { margin-top: 0; }
  .ep {
    display: grid;
    grid-template-columns: 38px 1fr;
    gap: 10px;
    align-items: center;
    padding: 9px 10px;
    margin: 2px 0;
    border-radius: var(--r-sm);
    cursor: pointer;
    color: var(--hull-2);
    font-family: var(--font-mono);
    border: 1px solid transparent;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .ep:hover { background: rgba(45,212,255,0.06); color: var(--hull); }
  .ep.active {
    background: rgba(45,212,255,0.10);
    color: var(--cyan-1);
    border-color: rgba(45,212,255,0.30);
    box-shadow: inset 0 0 20px rgba(45,212,255,0.04);
  }
  .ep .method {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-align: center;
    padding: 3px 0;
    border-radius: 2px;
    font-weight: 600;
    border: 1px solid currentColor;
    background: rgba(0,0,0,0.3);
  }
  .ep .method.get  { color: var(--good); }
  .ep .method.post { color: var(--cyan-1); }
  .ep .path { font-size: 12px; letter-spacing: 0.02em; }

  /* Request pane */
  .req {
    overflow-y: auto;
    padding: 22px 24px;
    border-right: 1px solid var(--stroke);
    min-width: 0;
  }
  .req-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 12px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--stroke);
  }
  .req-head h2 {
    font-size: 22px; letter-spacing: -0.01em; margin: 0;
    font-family: var(--font-mono);
  }
  .req-head h2 .method { color: var(--cyan-1); margin-right: 8px; font-size: 14px; }
  .req-head .endpoint-meta {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; color: var(--hull-3);
    text-transform: uppercase;
  }
  .req-desc {
    color: var(--hull-3);
    font-size: 13px; line-height: 1.55;
    margin: 0 0 16px;
    max-width: 70ch;
  }
  .req-desc .mono { color: var(--cyan-1); }

  .field {
    display: flex; flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }
  .field label {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--hull-3);
    display: flex; gap: 8px; align-items: baseline;
  }
  .field label .type {
    color: var(--cyan-1);
    font-size: 9px;
  }
  .field label .req-flag { color: var(--bad); }
  .field input, .field select, .field textarea {
    width: 100%; font-size: 13px;
    font-family: var(--font-mono);
  }
  .field textarea { min-height: 80px; resize: vertical; }
  .field .desc {
    color: var(--hull-3);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.5;
  }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .row-2 .field, .row-3 .field { margin-bottom: 0; }

  .send-row {
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap;
    margin: 20px 0 16px;
    padding-top: 16px;
    border-top: 1px solid var(--stroke);
  }
  .send-row .btn { white-space: nowrap; }
  .send-row .latency {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--hull-3); letter-spacing: 0.14em;
    margin-left: auto;
  }
  .send-row .latency em { font-style: normal; color: var(--cyan-1); }

  /* curl preview */
  .curl-preview {
    background: rgba(0,4,12,0.85);
    border: 1px solid rgba(45,212,255,0.22);
    border-radius: var(--r-md);
    font-family: var(--font-mono);
    font-size: 12px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .curl-preview .ch {
    padding: 8px 12px;
    background: rgba(8,20,52,0.7);
    border-bottom: 1px solid var(--stroke);
    font-family: var(--font-mono); font-size: 11px; color: var(--hull-2);
    letter-spacing: 0.14em; text-transform: uppercase;
    display: flex; gap: 12px; justify-content: space-between; align-items: center;
  }
  .curl-preview .ch span { white-space: nowrap; }
  .curl-preview pre {
    margin: 0; padding: 14px;
    color: var(--hull);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .curl-preview pre .pmt { color: var(--cyan-1); }
  .curl-preview pre .key { color: #c47bff; }
  .curl-preview pre .str { color: var(--good); }
  .copy-btn {
    background: transparent;
    border: 1px solid rgba(45,212,255,0.30);
    color: var(--cyan-1);
    font-family: var(--font-mono);
    font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: var(--r-sm);
    cursor: pointer;
  }
  .copy-btn:hover { background: rgba(45,212,255,0.12); }
  .copy-btn.copied { background: var(--good); color: var(--ink); border-color: var(--good); }

  /* Response pane */
  .resp {
    overflow-y: auto;
    padding: 22px 24px;
    background: rgba(2,6,15,0.35);
    min-width: 0;
  }
  .resp-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 12px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--stroke);
  }
  .resp-head h2 {
    font-size: 22px; letter-spacing: -0.01em; margin: 0;
    font-family: var(--font-mono);
  }
  .resp-status {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 12px;
    border-radius: var(--r-sm);
    border: 1px solid currentColor;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em;
    background: rgba(0,0,0,0.3);
  }
  .resp-status.idle { color: var(--hull-3); }
  .resp-status.loading {
    color: var(--warn);
    animation: pulseStatus 1.2s ease-in-out infinite;
  }
  .resp-status.ok { color: var(--good); }
  .resp-status.err { color: var(--bad); }
  @keyframes pulseStatus {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .resp-meta {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .resp-meta-tile {
    padding: 10px 12px;
    background: linear-gradient(180deg, var(--substrate-2), var(--substrate));
    border: 1px solid rgba(45,212,255,0.20);
    border-radius: var(--r-sm);
  }
  .resp-meta-tile .lbl {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.18em; color: var(--hull-3);
    text-transform: uppercase;
  }
  .resp-meta-tile .v {
    font-family: var(--font-mono); font-size: 14px;
    color: var(--cyan-1);
    margin-top: 3px;
  }

  .resp-body {
    background: rgba(0,4,12,0.85);
    border: 1px solid rgba(45,212,255,0.22);
    border-radius: var(--r-md);
    font-family: var(--font-mono); font-size: 12px;
    overflow: hidden;
  }
  .resp-body .rh {
    padding: 8px 12px;
    background: rgba(8,20,52,0.7);
    border-bottom: 1px solid var(--stroke);
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--hull-3);
    display: flex; justify-content: space-between; align-items: center;
  }
  .resp-body pre {
    margin: 0; padding: 14px;
    color: var(--hull);
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 50vh;
    overflow-y: auto;
  }
  .resp-body pre .key { color: var(--cyan-1); }
  .resp-body pre .str { color: var(--good); }
  .resp-body pre .num { color: var(--warn); }
  .resp-body pre .bool { color: #c47bff; }
  .resp-body pre .null { color: var(--hull-3); }

  .resp-empty {
    padding: 40px;
    text-align: center;
    color: var(--hull-3);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.1em;
  }
  .resp-empty em { color: var(--cyan-1); font-style: normal; }

  /* Image response */
  .resp-image {
    aspect-ratio: 1;
    background:
      repeating-linear-gradient(45deg, rgba(45,212,255,0.04) 0 10px, transparent 10px 20px),
      linear-gradient(135deg, var(--abyss-3), var(--abyss-1));
    border-radius: var(--r-md);
    border: 1px solid rgba(45,212,255,0.22);
    display: grid; place-items: center;
    color: var(--hull-3);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-top: 12px;
  }
  .resp-image img { max-width: 100%; max-height: 100%; }
</style>
<style>
/* Task 10 · quiet ambient motion on text-dense pages.
   The .bubbles tone-down is now global in styles.css (default 0.22/0.18).
   These overrides further quiet the HUD rings + god rays for the API
   reference where the wall of text needs maximum legibility. */
.abyss::before { opacity: 0.45; }
.abyss::after  { opacity: 0.55; }
.rays::before, .rays::after { opacity: 0.55; }

/* Task 13 · Route Inspector visualization */
.route-inspector {
  margin-bottom: 16px;
  padding: 16px 18px;
  border: 1px solid rgba(45,212,255,0.30);
  border-radius: var(--r-md);
  background: linear-gradient(180deg, rgba(13,33,82,0.55), rgba(5,11,28,0.75));
  position: relative;
}
.route-inspector::before {
  content: ""; position: absolute; inset: 6px; pointer-events: none;
  background:
    linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 12px 1px no-repeat,
    linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 1px 12px no-repeat,
    linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 12px 1px no-repeat,
    linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 1px 12px no-repeat;
  filter: drop-shadow(0 0 3px rgba(109,240,255,0.6)); opacity: 0.6;
}
.route-inspector > * { position: relative; z-index: 2; }
.ri-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.ri-head h3 { font-size: 14px; font-family: var(--font-mono); letter-spacing: 0.16em; color: var(--cyan-1); margin: 0 0 4px; font-weight: 500; }
.ri-sub { font-family: var(--font-mono); font-size: 11px; color: var(--hull-3); letter-spacing: 0.08em; }
.ri-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.ri-tile { padding: 10px 12px; border: 1px solid var(--stroke); border-radius: var(--r-sm); background: rgba(0,0,0,0.35); }
.ri-lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em; color: var(--hull-3); text-transform: uppercase; margin-bottom: 5px; }
.ri-v { font-size: 14px; color: var(--hull); }
.ri-v.mono { font-family: var(--font-mono); font-size: 12px; color: var(--cyan-1); word-break: break-all; }
.ri-section { margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(45,212,255,0.18); }
.ri-section-h { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; color: var(--hull-3); text-transform: uppercase; margin-bottom: 8px; }
.ri-chain { display: flex; align-items: stretch; gap: 8px; flex-wrap: wrap; }
.ri-node { flex: 1 1 200px; min-width: 180px; padding: 10px 12px; border: 1px solid var(--stroke); border-radius: var(--r-sm); background: rgba(0,0,0,0.4); }
.ri-node.primary { border-color: var(--cyan-1); box-shadow: inset 0 0 12px rgba(45,212,255,0.10); }
.ri-node-h { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 5px; }
.ri-role { font-family: var(--font-mono); font-size: 11px; color: var(--cyan-1); letter-spacing: 0.12em; text-transform: uppercase; }
.ri-model { font-family: var(--font-mono); font-size: 11px; color: var(--hull-2); word-break: break-all; line-height: 1.5; }
.ri-arrow { display: flex; align-items: center; color: var(--cyan-1); font-size: 18px; opacity: 0.5; padding: 0 2px; }
.ri-empty { font-family: var(--font-mono); font-size: 11px; color: var(--hull-3); padding: 8px 0; }
.ri-note { margin-top: 10px; padding: 8px 12px; font-family: var(--font-mono); font-size: 11px; color: var(--hull-2); line-height: 1.6; background: rgba(0,0,0,0.4); border-left: 2px solid var(--cyan-1); border-radius: 2px; }
.ri-note.ri-warn { color: var(--warn); border-left-color: var(--warn); }
.ri-note strong { color: var(--cyan-1); }
.ri-pre { font-family: var(--font-mono); font-size: 11.5px; color: var(--hull-2); padding: 10px 12px; background: rgba(0,0,0,0.55); border: 1px solid var(--stroke); border-radius: var(--r-sm); white-space: pre-wrap; word-break: break-word; line-height: 1.55; }

/* Task 9 · per-rail-item offline indicator */
.ep .ep-offline { display: none; margin-left: auto; font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.18em; padding: 1px 5px; color: var(--warn); border: 1px solid color-mix(in oklab, var(--warn) 45%, transparent); border-radius: 2px; }
.ep[data-offline] .ep-offline { display: inline-block; }
.ep[data-offline] .path { color: var(--hull-3); }
</style>
</head>
