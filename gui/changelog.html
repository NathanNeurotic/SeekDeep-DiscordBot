<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SeekDeep — Changelog</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { overflow: hidden; }
  .app-wrap { height: 100vh; padding: 24px; display: grid; place-items: center; }
  .win {
    width: 100%; max-width: 1500px; height: calc(100vh - 48px);
    display: grid; grid-template-rows: 44px 1fr;
    border-radius: var(--r-md); overflow: hidden;
    border: 1px solid rgba(45,212,255,0.25);
    background:
      linear-gradient(rgba(45,212,255,0.03) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(90deg, rgba(45,212,255,0.03) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(180deg, var(--substrate-2) 0%, var(--substrate) 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -1px 0 rgba(0,0,0,0.5), inset 0 0 0 1px rgba(0,0,0,0.35), inset 0 0 60px rgba(45,212,255,0.04), 0 50px 120px rgba(0,0,0,0.8), 0 0 100px rgba(45,212,255,0.10);
    position: relative;
  }
  .win::before { content: ""; position: absolute; inset: 10px; pointer-events: none;
    background:
      linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 1px 22px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) top right / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) top right / 1px 22px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom left / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom left / 1px 22px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 22px 1px no-repeat,
      linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 1px 22px no-repeat;
    filter: drop-shadow(0 0 6px rgba(109,240,255,0.55)); z-index: 0;
  }
  .win > * { position: relative; z-index: 1; }
  .win-titlebar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 16px; background: linear-gradient(180deg, rgba(20,48,107,0.95), rgba(8,20,52,0.95)); border-bottom: 1px solid var(--stroke); }
  .win-titlebar .left { display: flex; align-items: center; gap: 12px; }
  .win-titlebar .left img { width: 22px; height: 22px; }
  .win-titlebar .title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; color: var(--hull-2); text-transform: uppercase; }
  .win-titlebar .title em { font-style: normal; color: var(--cyan-1); }
  .win-titlebar .right { justify-self: end; display: flex; gap: 4px; }
  .win-titlebar .right a { display: flex; align-items: center; padding: 0 10px; height: 26px; color: var(--hull-3); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-decoration: none; border-radius: var(--r-sm); }
  .win-titlebar .right a:hover { color: var(--cyan-1); background: rgba(45,212,255,0.08); }

  .body { display: grid; grid-template-columns: 220px 1fr; overflow: hidden; min-height: 0; }
  .rail { background: rgba(2,6,15,0.55); border-right: 1px solid var(--stroke); overflow-y: auto; padding: 18px 14px; }
  .rail .grp { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--hull-3); text-transform: uppercase; padding: 6px 10px 10px; margin: 0 0 6px; border-bottom: 1px solid var(--stroke); display: flex; justify-content: space-between; }
  .rail .grp em { font-style: normal; color: var(--cyan-1); }
  .rail .ver { display: grid; grid-template-columns: 70px 1fr; gap: 10px; padding: 8px 10px; margin: 2px 0; border-radius: var(--r-sm); cursor: pointer; color: var(--hull-2); font-family: var(--font-mono); font-size: 12px; transition: background 0.15s, color 0.15s; user-select: none; }
  .rail .ver:hover { background: rgba(45,212,255,0.05); color: var(--hull); }
  .rail .ver.active { background: rgba(45,212,255,0.10); color: var(--cyan-1); }
  .rail .ver .num { color: var(--cyan-1); letter-spacing: 0.08em; }
  .rail .ver .lbl { font-size: 10px; color: var(--hull-3); letter-spacing: 0.08em; }

  .main { overflow-y: auto; padding: 24px 32px 40px; }
  .hero { padding-bottom: 14px; margin-bottom: 18px; border-bottom: 1px solid var(--stroke); }
  .hero h1 { font-size: 32px; letter-spacing: -0.02em; margin-bottom: 4px; }
  .hero .sub { color: var(--hull-3); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.06em; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 18px 0 24px; }
  .stat { padding: 12px 16px; background: linear-gradient(180deg, var(--substrate-2), var(--substrate)); border: 1px solid rgba(45,212,255,0.22); border-radius: var(--r-md); position: relative; }
  .stat::before { content: ""; position: absolute; inset: 4px; pointer-events: none; background: linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 10px 1px no-repeat, linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 1px 10px no-repeat, linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 10px 1px no-repeat, linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 1px 10px no-repeat; filter: drop-shadow(0 0 3px rgba(109,240,255,0.5)); opacity: 0.5; }
  .stat .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; color: var(--hull-3); text-transform: uppercase; }
  .stat .v { font-size: 26px; color: var(--cyan-1); margin-top: 4px; letter-spacing: -0.02em; }

  .timeline { display: flex; flex-direction: column; gap: 14px; }
  .release { padding: 18px 22px; background: linear-gradient(180deg, var(--substrate-2), var(--substrate)); border: 1px solid rgba(45,212,255,0.22); border-radius: var(--r-md); position: relative; overflow: hidden; scroll-margin-top: 16px; }
  .release::before { content: ""; position: absolute; inset: 5px; pointer-events: none; background: linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 12px 1px no-repeat, linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 1px 12px no-repeat, linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 12px 1px no-repeat, linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 1px 12px no-repeat; filter: drop-shadow(0 0 4px rgba(109,240,255,0.55)); }
  .release-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 10px; }
  .release-head h2 { font-size: 22px; letter-spacing: -0.01em; margin: 0; font-family: var(--font-mono); color: var(--cyan-1); }
  .release-head .tagline { font-size: 14px; color: var(--hull-2); flex: 1; }
  .release-head .badge { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; padding: 2px 8px; border-radius: 2px; text-transform: uppercase; border: 1px solid currentColor; background: rgba(0,0,0,0.3); color: var(--hull-3); }
  .release-head .badge.fresh { color: var(--good); }
  .release-head .badge.major { color: var(--cyan-1); }
  .release-head .badge.patch { color: var(--warn); }
  .release-tags { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; padding: 2px 7px; border-radius: 2px; text-transform: uppercase; border: 1px solid rgba(45,212,255,0.30); color: var(--cyan-1); background: rgba(0,4,12,0.5); }
  .tag.c-fix { color: var(--warn); border-color: rgba(255,184,77,0.35); }
  .tag.c-feat { color: var(--cyan-1); }
  .tag.c-perf { color: var(--good); border-color: rgba(88,230,161,0.35); }
  .tag.c-docs { color: var(--hull-3); border-color: rgba(125,146,184,0.35); }
  .release p { color: var(--hull-2); font-size: 13px; line-height: 1.6; margin: 0 0 8px; }
  .release p .mono { color: var(--cyan-1); }
  .release ul { margin: 0; padding-left: 18px; color: var(--hull-2); font-size: 13px; line-height: 1.65; }
  .release ul li { padding: 2px 0; }
  .release ul li .mono { color: var(--cyan-1); }
  .release .meta { font-family: var(--font-mono); font-size: 10px; color: var(--hull-3); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 12px; padding-top: 10px; border-top: 1px dashed rgba(45,212,255,0.15); display: flex; justify-content: space-between; }
  .release .meta em { font-style: normal; color: var(--cyan-1); }
</style>
</head>
