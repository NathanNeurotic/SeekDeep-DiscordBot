<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SeekDeep — Guided Tour</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { overflow: hidden; height: 100vh; }
  .stage { position: fixed; inset: 0; display: grid; place-items: center; }

  /* Background mock — abstracted control center silhouette */
  .bg-mock { position: absolute; inset: 60px; border-radius: var(--r-md); border: 1px solid rgba(45,212,255,0.20); display: grid; grid-template-columns: 210px 1fr; opacity: 0.9; pointer-events: none; overflow: hidden; background: rgba(2,6,15,0.4); }
  .bg-mock .sb { background: rgba(2,6,15,0.6); border-right: 1px solid rgba(45,212,255,0.14); padding: 16px 12px; display: flex; flex-direction: column; gap: 8px; }
  .bg-mock .sb .brand { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; color: var(--cyan-1); text-transform: uppercase; padding: 4px 8px 10px; }
  .bg-mock .sb .item { display: flex; align-items: center; gap: 9px; padding: 0 11px; height: 34px; background: rgba(45,212,255,0.07); border: 1px solid rgba(45,212,255,0.12); border-radius: var(--r-sm); font-family: var(--font-mono); font-size: 12px; color: var(--hull-2); }
  .bg-mock .sb .item .ic { color: var(--cyan-1); font-size: 13px; width: 15px; text-align: center; }
  .bg-mock .main { padding: 22px; display: grid; grid-template-rows: 48px 1fr; gap: 16px; }
  .bg-mock .main .h { display: flex; align-items: center; gap: 10px; padding: 0 16px; height: 48px; background: rgba(45,212,255,0.07); border: 1px solid rgba(45,212,255,0.12); border-radius: var(--r-sm); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.14em; color: var(--hull); text-transform: uppercase; }
  .bg-mock .main .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-content: start; }
  .bg-mock .main .cell { display: grid; place-items: center; height: 84px; background: rgba(45,212,255,0.05); border: 1px solid rgba(45,212,255,0.12); border-radius: var(--r-sm); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--hull-2); text-transform: uppercase; }

  /* Backdrop dim */
  .backdrop { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(2,6,15,0.6) 50%, rgba(2,6,15,0.85) 100%); z-index: 1; }

  /* Spotlight cutout */
  .spot { position: absolute; z-index: 2; border: 2px solid var(--cyan-1); border-radius: var(--r-md); box-shadow: 0 0 0 99999px rgba(2,6,15,0.78), 0 0 30px rgba(45,212,255,0.5), inset 0 0 30px rgba(45,212,255,0.10); transition: top 0.45s cubic-bezier(0.4,0,0.2,1), left 0.45s cubic-bezier(0.4,0,0.2,1), width 0.45s cubic-bezier(0.4,0,0.2,1), height 0.45s cubic-bezier(0.4,0,0.2,1); }
  .spot::before, .spot::after { content: ""; position: absolute; }
  .spot::before { top: -1px; left: -1px; width: 20px; height: 20px; border-top: 3px solid var(--cyan-0); border-left: 3px solid var(--cyan-0); box-shadow: -2px -2px 8px rgba(45,212,255,0.5); }
  .spot::after  { bottom: -1px; right: -1px; width: 20px; height: 20px; border-bottom: 3px solid var(--cyan-0); border-right: 3px solid var(--cyan-0); box-shadow: 2px 2px 8px rgba(45,212,255,0.5); }

  /* Tour card */
  .tour-card { position: absolute; z-index: 3; width: 380px; max-width: calc(100vw - 80px); padding: 22px 24px; background: linear-gradient(180deg, var(--substrate-2), var(--substrate)); border: 1px solid rgba(45,212,255,0.45); border-radius: var(--r-md); box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 40px rgba(45,212,255,0.25); transition: top 0.45s cubic-bezier(0.4,0,0.2,1), left 0.45s cubic-bezier(0.4,0,0.2,1); }
  .tour-card::before { content: ""; position: absolute; inset: 6px; pointer-events: none; background: linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 12px 1px no-repeat, linear-gradient(var(--trace-hi), var(--trace-hi)) top left / 1px 12px no-repeat, linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 12px 1px no-repeat, linear-gradient(var(--trace-hi), var(--trace-hi)) bottom right / 1px 12px no-repeat; filter: drop-shadow(0 0 4px rgba(109,240,255,0.6)); }

  .tour-step { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--cyan-1); text-transform: uppercase; margin-bottom: 6px; }
  .tour-step em { font-style: normal; color: var(--hull); }
  .tour-title { font-size: 20px; letter-spacing: -0.01em; margin-bottom: 8px; }
  .tour-body { color: var(--hull-2); font-size: 13px; line-height: 1.6; }
  .tour-body .mono { color: var(--cyan-1); }
  .tour-tip { margin-top: 12px; padding: 10px 12px; background: rgba(45,212,255,0.05); border-left: 2px solid var(--cyan-1); font-family: var(--font-mono); font-size: 11px; color: var(--cyan-1); letter-spacing: 0.06em; }

  .tour-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(45,212,255,0.15); }
  .tour-dots { display: flex; gap: 6px; }
  .tour-dots i { width: 7px; height: 7px; border-radius: 50%; background: rgba(45,212,255,0.20); cursor: pointer; transition: background 0.15s; }
  .tour-dots i.on { background: var(--cyan-1); box-shadow: 0 0 6px var(--cyan-0); width: 20px; border-radius: 4px; }

  .tour-nav button { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 12px; cursor: pointer; border-radius: var(--r-sm); }
  .btn-prev { background: transparent; border: 1px solid rgba(45,212,255,0.30); color: var(--cyan-1); }
  .btn-prev:hover { background: rgba(45,212,255,0.08); }
  .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-next { background: linear-gradient(180deg, var(--cyan-1), var(--cyan-2)); border: 1px solid rgba(109,240,255,0.65); color: var(--ink); font-weight: 700; box-shadow: 0 0 14px rgba(45,212,255,0.3); }
  .btn-next:hover { box-shadow: 0 0 24px rgba(45,212,255,0.5); }
  .btn-skip { position: absolute; top: 24px; right: 28px; z-index: 4; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--hull-3); background: transparent; border: 1px solid rgba(45,212,255,0.18); padding: 6px 12px; border-radius: var(--r-sm); cursor: pointer; }
  .btn-skip:hover { color: var(--cyan-1); border-color: var(--cyan-1); }

  /* Hide-on-mobile */
  @media (max-width: 800px) {
    .bg-mock { grid-template-columns: 140px 1fr; inset: 28px; }
    .bg-mock .sb .item { font-size: 11px; gap: 6px; padding: 0 8px; }
  }
</style>
</head>
<body>
<div class="abyss"></div>
<div class="rays"></div>
<div class="bubbles">
  <span style="left:4%;animation-duration:24s;animation-delay:-3s"></span>
  <span class="cube" style="left:28%;animation-duration:42s;animation-delay:-22s"></span>
  <span style="left:48%;animation-duration:22s;animation-delay:-2s;width:2px;height:2px"></span>
  <span class="cube big" style="left:54%;animation-duration:48s;animation-delay:-30s"></span>
  <span style="left:84%;animation-duration:44s;animation-delay:-25s" class="cube"></span>
</div>

<div class="mock-tag"><strong>⚠ Mock</strong> · guided tour overlay</div>
<div class="stage">
  <div class="bg-mock">
    <div class="sb">
      <div class="brand">◇ SeekDeep</div>
      <div class="item" id="m-sb-1"><span class="ic">⚡</span> Launcher</div>
      <div class="item" id="m-sb-2"><span class="ic">▥</span> GPU &amp; VRAM</div>
      <div class="item" id="m-sb-3"><span class="ic">◈</span> Models</div>
      <div class="item" id="m-sb-4"><span class="ic">⚙</span> Config</div>
      <div class="item" id="m-sb-5"><span class="ic">▦</span> Logs</div>
    </div>
    <div class="main">
      <div class="h" id="m-head">◰ Control Center</div>
      <div class="grid">
        <div class="cell" id="m-c1">Chat</div>
        <div class="cell" id="m-c2">Image</div>
        <div class="cell" id="m-c3">Archive</div>
        <div class="cell" id="m-c4">Stats</div>
      </div>
    </div>
  </div>

  <div class="backdrop"></div>
  <button class="btn-skip" id="skipBtn">✕ Skip tour</button>

  <div class="spot" id="spot"></div>
  <div class="tour-card" id="card">
    <div class="tour-step">STEP <em id="stepNum">1</em> / 7</div>
    <div class="tour-title" id="title">Welcome to SeekDeep</div>
    <div class="tour-body" id="body">SeekDeep runs Llama-3.1, Qwen-VL, and SDXL entirely on your machine. This quick tour walks you through the five core surfaces.</div>
    <div class="tour-tip" id="tip" style="display:none;"></div>
    <div class="tour-nav">
      <button class="btn-prev" id="prevBtn">← Prev</button>
      <div class="tour-dots" id="dots"></div>
      <button class="btn-next" id="nextBtn">Next →</button>
    </div>
  </div>
</div>

<script src="tour.page.js" defer></script>
<script src="nav.js" defer></script>
</body>
</html>
