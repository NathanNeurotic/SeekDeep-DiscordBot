<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SeekDeep — Setup Wizard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { margin: 0; min-height: 100vh; background: var(--substrate); display: grid; place-items: center; padding: 32px; }
  .wiz {
    width: 100%; max-width: 720px; min-height: 600px;
    background: linear-gradient(180deg, var(--substrate-2), var(--substrate));
    border: 1px solid var(--stroke); border-radius: var(--r-md);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(45,212,255,0.05);
    padding: 36px 36px 28px; display: flex; flex-direction: column;
  }
  .wiz-head { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .wiz-head img { width: 44px; height: 44px; border-radius: 50%; box-shadow: 0 0 24px rgba(45,212,255,0.4); }
  .wiz-head h1 { margin: 0; font-size: 22px; letter-spacing: 0.02em; }
  .wiz-head .sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; color: var(--hull-3); text-transform: uppercase; margin-top: 4px; }
  .progress {
    margin-top: 18px; height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden;
  }
  .progress > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--cyan-2), var(--cyan-0)); transition: width 0.4s ease-out; }
  .step-list { margin: 24px 0 0; padding: 0; list-style: none; flex: 1; }
  .step {
    display: grid; grid-template-columns: 28px 1fr auto;
    gap: 14px; align-items: start; padding: 12px 0;
    border-bottom: 1px dashed color-mix(in oklab, var(--cyan-1) 8%, transparent);
  }
  .step.done .mark { color: var(--good); }
  .step.busy .mark { color: var(--warn); animation: pulse 1.2s ease-in-out infinite; }
  .step.bad  .mark { color: var(--bad); }
  .step.skip .mark { color: var(--hull-3); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .step .mark { font-family: var(--font-mono); font-size: 16px; padding-top: 2px; }
  .step .label { font-weight: 500; color: var(--hull-1); }
  .step .detail { font-size: 12px; color: var(--hull-3); margin-top: 3px; line-height: 1.5; }
  .step .action { display: flex; gap: 6px; align-items: center; }
  .step .action button { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; padding: 6px 12px; border-radius: var(--r-sm); cursor: pointer; }
  .step .action button.primary { background: var(--cyan-2); color: #000; border: 0; }
  .step .action button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .step .action button.skip { background: transparent; color: var(--hull-3); border: 1px solid var(--stroke); }
  .step .action button.skip:hover { color: var(--hull-1); border-color: var(--hull-3); }
  .step .prompt-row { grid-column: 2 / -1; margin-top: 10px; display: flex; gap: 8px; align-items: center; }
  .step .prompt-row input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--stroke); border-radius: var(--r-sm); padding: 7px 10px; color: var(--hull-1); font-family: var(--font-mono); font-size: 12px; }
  .step .prompt-row input:focus { outline: none; border-color: var(--cyan-1); }
  .step .prompt-row .field-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--hull-3); text-transform: uppercase; min-width: 130px; }
  .step .prompt-err { grid-column: 2 / -1; color: var(--bad); font-family: var(--font-mono); font-size: 10.5px; margin-top: 6px; padding-left: 0; line-height: 1.45; }
  .footer { margin-top: 22px; display: flex; justify-content: space-between; align-items: center; gap: 14px; }
  .footer .left { font-family: var(--font-mono); font-size: 10.5px; color: var(--hull-3); letter-spacing: 0.1em; }
  .footer .right { display: flex; gap: 8px; }
  .footer button { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; padding: 8px 14px; border-radius: var(--r-sm); cursor: pointer; }
  .footer .skip-all { background: transparent; color: var(--hull-3); border: 1px solid var(--stroke); }
  .footer .skip-all:hover { color: var(--hull-1); border-color: var(--hull-3); }
  .footer .open-app { background: var(--cyan-2); color: #000; border: 0; }
  .footer .open-app:disabled { opacity: 0.5; cursor: not-allowed; }
  .log {
    margin-top: 14px; max-height: 140px; overflow: auto;
    font-family: var(--font-mono); font-size: 10.5px; color: var(--hull-3);
    background: rgba(0,0,0,0.4); border: 1px solid var(--stroke); border-radius: var(--r-sm);
    padding: 8px 12px; display: none; line-height: 1.55;
  }
  .log.active { display: block; }
  .log .line { white-space: pre-wrap; padding: 2px 0; }
  .log .line.err { color: var(--bad); }
  .log .line.ok  { color: var(--good); }
</style>
</head>
<body>
<div class="wiz" id="wiz">
  <div class="wiz-head">
    <img src="assets/seekdeep-mark.webp" alt="" />
    <div>
      <h1>SeekDeep Setup</h1>
      <div class="sub">▸ first-run wizard · zero terminal required</div>
    </div>
  </div>
  <div class="progress"><i id="progBar"></i></div>
  <!-- Self-update banner. Shown when the running server is missing
       endpoints we expect (detected by fix_action absence on checks
       that should have one). One-click upgrade from GitHub `main`. -->
  <div id="updateBanner" style="display:none; margin-top:14px; padding:10px 14px; border:1px solid color-mix(in oklab, var(--cyan-1) 40%, transparent); background: rgba(45,212,255,0.06); border-radius: var(--r-sm); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
      <div>
        <strong style="color: var(--cyan-1);">▸ UPDATE AVAILABLE</strong><br>
        <span style="color: var(--hull-3); font-size: 10.5px; letter-spacing: 0.06em;" id="updateDetail">
          The bundled SeekDeep server is missing features added since this build. One-click upgrade from GitHub <code>main</code>.
        </span>
      </div>
      <button id="updateBtn" style="background: var(--cyan-2); color:#000; border:0; padding:8px 14px; border-radius: var(--r-sm); cursor:pointer; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;">▸ UPDATE NOW</button>
    </div>
  </div>
  <ul class="step-list" id="stepList"></ul>
  <div class="log" id="installLog"></div>
  <div class="footer">
    <div class="left" id="ftStatus">probing…</div>
    <div class="right">
      <button class="skip-all" id="ftSkipAll" title="Use SeekDeep with whatever's currently set up. You can return to the wizard later from Control Center.">Skip to app</button>
      <button class="open-app" id="ftOpenApp" disabled>Open SeekDeep ▸</button>
    </div>
  </div>
</div>
<script src="pages.js" defer></script>
<script src="nav.js" defer></script>
<script src="setup-wizard.page.js" defer></script>
</body>
</html>
